name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download DMG from release
        run: |
          curl -L \
            "https://github.com/cchitsiang/CodeBubble/releases/download/v${VERSION}/CodeBubble.dmg" \
            -o CodeBubble.dmg

      - name: Compute SHA256
        run: echo "SHA256=$(sha256sum CodeBubble.dmg | awk '{print $1}')" >> $GITHUB_ENV

      - name: Clone homebrew-tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/cchitsiang/homebrew-tap.git" homebrew-tap

      - name: Update Cask formula
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/codebubble.rb <<'CASK_EOF'
          cask "codebubble" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/cchitsiang/CodeBubble/releases/download/v#{version}/CodeBubble.dmg"
            name "CodeBubble"
            desc "Passive status panel for AI coding agents in macOS notch"
            homepage "https://github.com/cchitsiang/CodeBubble"

            app "CodeBubble.app"

            zap trash: [
              "~/.codebubble",
            ]
          end
          CASK_EOF
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" homebrew-tap/Casks/codebubble.rb
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/" homebrew-tap/Casks/codebubble.rb
          sed -i 's/^          //' homebrew-tap/Casks/codebubble.rb

      - name: Commit and push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/codebubble.rb
          git commit -m "Update codebubble to ${VERSION}"
          git push
